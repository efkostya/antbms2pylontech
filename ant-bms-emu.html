<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ANT BMS Hardware Emulator (Syssi Protocol)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        h1 { color: #4CAF50; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        label { display: block; margin-top: 10px; font-size: 0.9em; color: #aaa; }
        input, select, button { width: 100%; padding: 8px; margin-top: 4px; background: #2c2c2c; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { background: #4CAF50; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; border: none; }
        button:hover { background: #45a049; }
        button.btn-red { background: #f44336; color: white; }
        button.btn-red:hover { background: #d32f2f; }
        .cells-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .temps-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 10px; }
        .hex-box { background: #000; padding: 15px; font-family: monospace; font-size: 14px; color: #0f0; border-radius: 5px; word-wrap: break-word; line-height: 1.5; }
        .log-box { background: #000; padding: 10px; color: #ccc; font-family: monospace; font-size: 12px; height: 100px; overflow-y: auto; border-radius: 5px; margin-top: 10px; }
        .highlight { color: #ffeb3b; }
    </style>
</head>
<body>

    <h1>🔋 ANT BMS Hardware Emulator (Syssi 140-byte Protocol)</h1>

    <div class="grid">
        <div class="card">
            <h3>Статусы и Мощность</h3>
            <label>Ток (А) [полож. = разряд]:</label>
            <input type="number" id="inp-current" step="0.1" value="-3.0" oninput="updateFrame()">
            
            <label>Мощность (Вт):</label>
            <input type="number" id="inp-power" value="-168" oninput="updateFrame()">
            
            <label>Уровень заряда (SOC %):</label>
            <input type="number" id="inp-soc" min="0" max="100" value="95" oninput="updateFrame()">

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>MOSFET Заряд:</label>
                    <select id="inp-chg" onchange="updateFrame()">
                        <option value="1">1 - Вкл</option>
                        <option value="0">0 - Откл</option>
                        <option value="2">2 - Защита</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>MOSFET Разряд:</label>
                    <select id="inp-dsg" onchange="updateFrame()">
                        <option value="1">1 - Вкл</option>
                        <option value="0">0 - Откл</option>
                        <option value="2">2 - Защита</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Балансир:</label>
                    <select id="inp-bal" onchange="updateFrame()">
                        <option value="0">0 - Откл</option>
                        <option value="1">1 - limit trigger exceeds</option>
						<option value="2">2 - charging v diff too high</option>
						<option value="3">3 - overtemp</option>
						<option value="4">4 - ACTIVE</option>
						<option value="5">5 - 5-udef</option>
						<option value="6">6 - 6-udef</option>
						<option value="7">7 - 7-udef</option>
						<option value="8">8 - 8-udef</option>
						<option value="9">9 - 9-udef</option>
						<option value="10">10 - PCB Overtemp</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Емкости и Температуры</h3>
            <label>Полная емкость (Ah):</label>
            <input type="number" id="inp-full-cap" step="0.1" value="234.0" oninput="updateFrame()">
            
            <label>Остаток емкости (Ah):</label>
            <input type="number" id="inp-rem-cap" step="0.1" value="195.3" oninput="updateFrame()">
            
            <label>Накопленная/Цикл. емкость (Ah):</label>
            <input type="number" id="inp-cyc-cap" step="0.1" value="250" oninput="updateFrame()">

            <label>Датчики T1-T6 (°C):</label>
            <div class="temps-grid">
                <input type="number" id="inp-t1" value="23" oninput="updateFrame()" title="T1">
                <input type="number" id="inp-t2" value="25" oninput="updateFrame()" title="T2">
                <input type="number" id="inp-t3" value="21" oninput="updateFrame()" title="T3">
                <input type="number" id="inp-t4" value="21" oninput="updateFrame()" title="T4">
                <input type="number" id="inp-t5" value="-40" oninput="updateFrame()" title="T5 (Отключен)">
                <input type="number" id="inp-t6" value="-40" oninput="updateFrame()" title="T6 (Отключен)">
            </div>
        </div>

        <div class="card">
            <h3>Ячейки (мВ) 1-16</h3>
            <div class="cells-grid" id="cells-container"></div>
            <button onclick="setAllCells(3350)" style="margin-top: 10px; background: #333; color: white;">Выровнять на 3.35В</button>
        </div>

        <div class="card">
            <h3>COM Порт (UART)</h3>
            <label>Скорость (Baud Rate):</label>
            <select id="baud-rate">
                <option value="19200">19200 (Новые платы)</option>
                <option value="9600">9600 (Старые платы)</option>
            </select>
            <button id="btn-connect" onclick="connectCOM()" style="margin-top: 10px;">🔌 Подключить порт</button>
            <button id="btn-send" onclick="sendToCOM()" style="margin-top: 10px;" class="btn-red" disabled>Отправить пакет</button>
            <label style="margin-top: 10px;"><input type="checkbox" id="auto-send" onchange="toggleAutoSend()"> Авто-отправка (1 раз в сек)</label>
            <div class="log-box" id="serial-log">Ожидание подключения...</div>
        </div>
    </div>

    <h3>Телеметрический пакет (140 байт)</h3>
    <div class="hex-box" id="hex-output"></div>

<script>
    // Инициализация ячеек
    const cellsContainer = document.getElementById('cells-container');
    const defaultVoltages = [3350, 3360, 3375, 3400, 3415, 3420, 3430, 3450, 3390, 3385, 3440, 3355, 3405, 3425, 3370, 3395];
    for(let i = 0; i < 16; i++) {
        cellsContainer.innerHTML += `<input type="number" id="cell-${i}" value="${defaultVoltages[i]}" oninput="updateFrame()" title="Ячейка ${i+1}">`;
    }

    function setAllCells(v) {
        for(let i = 0; i < 16; i++) document.getElementById(`cell-${i}`).value = v;
        updateFrame();
    }

    // Жестко фиксируем длину пакета в 140 байт!
    let frame = new Uint8Array(140);
    
    // Статичный "хвост", выровненный строго по индексам [106] - [110] и [123] - [137]
    const tailPadding = [
        0x00, 0x00, 0x00, 0x00, 0xFF, // 106-110: Tire length, Pulses, Relay etc.
        0x10, // 123: Active cells (16)
        0x00, 0x00, 0x00, 0x7F, 0x00, 0x7B, 0x02, 0xAF, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00 // 124-137
    ];
    
    function updateFrame() {
        // [0:3] Заголовок
        frame[0] = 0xAA; frame[1] = 0x55; frame[2] = 0xAA; frame[3] = 0xFF;

        // --- 1. Напряжения ячеек [6:69] ---
        let sumVolts = 0, maxV = 0, minV = 9999, maxIdx = 0, minIdx = 0;
        for(let i = 0; i < 16; i++) {
            let v = parseInt(document.getElementById(`cell-${i}`).value);
            sumVolts += v;
            if(v > maxV) { maxV = v; maxIdx = i + 1; }
            if(v < minV) { minV = v; minIdx = i + 1; }
            frame[6 + (i*2)] = (v >> 8) & 0xFF;
            frame[7 + (i*2)] = v & 0xFF;
        }

        // Зануляем неиспользуемые ячейки (17-32)
        for(let i = 38; i < 70; i++) frame[i] = 0;

        // [4:5] Общее напряжение
        let totalVolts = Math.round(sumVolts / 100); 
        frame[4] = (totalVolts >> 8) & 0xFF;
        frame[5] = totalVolts & 0xFF;

        // [70:73] Ток (Signed 32-bit, 0.1A)
        let cur32 = new Int32Array([Math.round(parseFloat(document.getElementById('inp-current').value) * 10)])[0];
        frame[70] = (cur32 >>> 24) & 0xFF; frame[71] = (cur32 >>> 16) & 0xFF;
        frame[72] = (cur32 >>> 8) & 0xFF;  frame[73] = cur32 & 0xFF;

        // [74] SOC (%)
        frame[74] = parseInt(document.getElementById('inp-soc').value) & 0xFF;

        // [75:86] Емкости (Unsigned 32-bit, uAh)
        let fCap = new Uint32Array([Math.round(parseFloat(document.getElementById('inp-full-cap').value) * 1000000)])[0];
        frame[75] = (fCap >>> 24) & 0xFF; frame[76] = (fCap >>> 16) & 0xFF; frame[77] = (fCap >>> 8) & 0xFF; frame[78] = fCap & 0xFF;

        let rCap = new Uint32Array([Math.round(parseFloat(document.getElementById('inp-rem-cap').value) * 1000000)])[0];
        frame[79] = (rCap >>> 24) & 0xFF; frame[80] = (rCap >>> 16) & 0xFF; frame[81] = (rCap >>> 8) & 0xFF; frame[82] = rCap & 0xFF;

        let cCap = new Uint32Array([Math.round(parseFloat(document.getElementById('inp-cyc-cap').value) * 1000)])[0];
        frame[83] = (cCap >>> 24) & 0xFF; frame[84] = (cCap >>> 16) & 0xFF; frame[85] = (cCap >>> 8) & 0xFF; frame[86] = cCap & 0xFF;

        // [87:90] Uptime (Хардкод: 17 дней, как в твоем дампе)
        frame[87] = 0x00; frame[88] = 0x17; frame[89] = 0xB7; frame[90] = 0xE2; 

        // [91:102] Температуры 1-6 (Signed 16-bit)
        for(let i=0; i<6; i++) {
            let t = parseInt(document.getElementById(`inp-t${i+1}`).value);
            frame[91 + (i*2)] = (t >> 8) & 0xFF; 
            frame[92 + (i*2)] = t & 0xFF;
        }

        // [103:105] MOSFET и Балансир
        frame[103] = parseInt(document.getElementById('inp-chg').value);
        frame[104] = parseInt(document.getElementById('inp-dsg').value);
        frame[105] = parseInt(document.getElementById('inp-bal').value);

        // [106:110] Возвращаем служебные нули из статики
        for(let i=0; i<5; i++) frame[106 + i] = tailPadding[i];

        // [111:114] Мощность (Signed 32-bit)
        let pow32 = new Int32Array([parseInt(document.getElementById('inp-power').value)])[0];
        frame[111] = (pow32 >>> 24) & 0xFF; frame[112] = (pow32 >>> 16) & 0xFF;
        frame[113] = (pow32 >>> 8) & 0xFF;  frame[114] = pow32 & 0xFF;

        // [115:122] Статистика ячеек
        let avgV = Math.round(sumVolts / 16);
        frame[115] = maxIdx; frame[116] = (maxV >> 8) & 0xFF; frame[117] = maxV & 0xFF;
        frame[118] = minIdx; frame[119] = (minV >> 8) & 0xFF; frame[120] = minV & 0xFF;
        frame[121] = (avgV >> 8) & 0xFF; frame[122] = avgV & 0xFF;

        // [123:137] Окончание пакета (Active cells + padding)
        for(let i=0; i<15; i++) frame[123 + i] = tailPadding[5 + i];

        // [138:139] CRC (Сумма байт 4..137)
        let crc = 0;
        for(let i = 4; i <= 137; i++) crc += frame[i];
        frame[138] = (crc >> 8) & 0xFF;
        frame[139] = crc & 0xFF;

        renderHex();
    }

    function renderHex() {
        let hexArr = Array.from(frame).map(b => b.toString(16).padStart(2, '0').toUpperCase());
        
        let html = hexArr.slice(0, 4).join(' ') + ' '; // [0:3] Header
        html += `<span class="highlight" title="Общее напряжение">${hexArr.slice(4, 6).join(' ')}</span> `; // [4:5]
        html += `<span style="color: #ff9800" title="Напряжения активных ячеек">${hexArr.slice(6, 38).join(' ')}</span> `; // [6:37]
        html += hexArr.slice(38, 70).join(' ') + ' '; // [38:69] Пустые ячейки
        html += `<span style="color: #03a9f4" title="Ток">${hexArr.slice(70, 74).join(' ')}</span> `; // [70:73]
        html += `<span class="highlight" title="SOC (%)">${hexArr[74]}</span> `; // [74]
        html += `<span style="color: #4caf50" title="Емкости (Полн/Ост/Цикл)">${hexArr.slice(75, 87).join(' ')}</span> `; // [75:86]
        html += hexArr.slice(87, 91).join(' ') + ' '; // [87:90] Аптайм
        html += `<span style="color: #ff5722" title="Температуры T1-T6">${hexArr.slice(91, 103).join(' ')}</span> `; // [91:102]
        html += `<span style="color: #e91e63" title="Ключи (CHG/DSG/BAL)">${hexArr.slice(103, 106).join(' ')}</span> `; // [103:105]
        html += hexArr.slice(106, 111).join(' ') + ' '; // [106:110]
        html += `<span style="color: #03a9f4" title="Мощность">${hexArr.slice(111, 115).join(' ')}</span> `; // [111:114]
        html += `<span style="color: #9c27b0" title="Статистика балансира">${hexArr.slice(115, 123).join(' ')}</span> `; // [115:122]
        html += hexArr.slice(123, 138).join(' ') + ' '; // [123:137] Окончание
        html += `<span style="color: #f44336; font-weight:bold" title="CRC Контрольная сумма">${hexArr.slice(138, 140).join(' ')}</span>`; // [138:139]
        
        document.getElementById('hex-output').innerHTML = html;
    }

    // --- Web Serial API ---
    let port, writer, autoSendInterval;

    function logInfo(msg) {
        let box = document.getElementById('serial-log');
        box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function connectCOM() {
        if (!("serial" in navigator)) return alert("Ваш браузер не поддерживает Web Serial API! Используйте Chrome/Edge.");
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: parseInt(document.getElementById('baud-rate').value) });
            logInfo(`✅ Порт подключен!`);
            document.getElementById('btn-connect').style.display = 'none';
            document.getElementById('btn-send').disabled = false;
        } catch (err) { logInfo("❌ Ошибка: " + err); }
    }

    async function sendToCOM() {
        if (!port || !port.writable) return logInfo("⚠️ Порт недоступен!");
        try {
            writer = port.writable.getWriter();
            await writer.write(frame);
            writer.releaseLock();
            logInfo("📤 Пакет 140 байт отправлен");
        } catch (err) {
            logInfo("❌ Ошибка отправки: " + err);
            if(writer) writer.releaseLock();
        }
    }

    function toggleAutoSend() {
        if (document.getElementById('auto-send').checked) {
            autoSendInterval = setInterval(sendToCOM, 1000);
            logInfo("⏱ Авто-отправка включена (1 Гц)");
        } else {
            clearInterval(autoSendInterval);
            logInfo("⏹ Авто-отправка выключена");
        }
    }

    updateFrame();
</script>
</body>
</html>
